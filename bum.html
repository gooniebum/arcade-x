<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Arcade X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --accent-glow: #00f2ff;
        }
        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .atmosphere {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 80% 20%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(255, 0, 122, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1) 0%, transparent 70%),
                #020205;
            z-index: -1;
        }
        .atmosphere::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 20% 30%, #fff, transparent),
                radial-gradient(2px 2px at 40% 70%, #fff, transparent),
                radial-gradient(1px 1px at 50% 15%, #fff, transparent),
                radial-gradient(1px 1px at 80% 40%, #fff, transparent),
                radial-gradient(2px 2px at 90% 80%, #fff, transparent),
                radial-gradient(1px 1px at 70% 60%, #fff, transparent),
                radial-gradient(1px 1px at 30% 90%, #fff, transparent);
            background-size: 300px 300px;
            opacity: 0.3;
            animation: starsTwinkle 4s ease-in-out infinite alternate;
        }
        .atmosphere::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 40% 40%, rgba(0, 242, 255, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 60% 60%, rgba(255, 0, 122, 0.03) 0%, transparent 30%);
            filter: blur(40px);
            pointer-events: none;
        }
        @keyframes starsTwinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.05); }
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #00f2ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.5rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .back-link {
            margin-top: 2rem;
            display: inline-block;
            color: #00f2ff;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #00f2ff;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: #00f2ff;
            color: #050508;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="atmosphere"></div>
    <div class="container">
        <h1>Arcade X</h1>
        <p>its just a game website you bum</p>
        <a href="/" class="back-link">Go Back</a>
    </div>
</body>
</html>
